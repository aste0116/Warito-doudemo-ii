<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>わりとどうでもいいジェネレーター</title>
    <meta name="description" content="自分だけの「わりとどうでもいい猫」を作ろう！">
    <meta property="og:title" content="わりとどうでもいいジェネレーター">
    <meta property="og:description" content="自分だけの「わりとどうでもいい猫」を作ろう！">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://astetris.github.io/warito-doudemo-ii/">
    
    <!-- Google Fonts の読み込み（ドットフォント用） -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    
    <!-- CSSファイルの読み込み設定 -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <!-- タイトル（5回連続タップで管理者メニューが出ます） -->
        <h1 id="secret-trigger">わりとどうでもいい<br>ジェネレーター</h1>
        
        <!-- 管理者用メニュー -->
        <div id="admin-ui" class="hidden">
            <p class="admin-title">🛠️ 管理者メニュー</p>
            <input type="file" id="image-input" accept="image/*">
            <div class="admin-buttons">
                <button type="button" id="reset-btn">リセット</button>
                <button type="button" id="close-btn">閉じる</button>
            </div>
        </div>

        <label for="text-input">文字を入力（改行できます）</label>
        <textarea id="text-input">わりと
どうでも
いい</textarea>

        <label>プレビュー</label>
        <div class="canvas-container">
            <canvas id="preview-canvas"></canvas>
        </div>

        <button id="download-btn">画像をつくる</button>

        <div id="result-wrap" style="display: none;">
            <label>長押しで保存してね！</label>
            <img id="result-img" alt="完成画像">
        </div>
    </div>

    <!-- JavaScriptファイルの読み込み設定 -->
    <script src="script.js"></script>
</body>
</html>
